name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and upload release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build release package
        run: npm run package

      - name: Check release package contents
        run: |
          if [ -f release/.env ]; then
            echo "release/.env must not be included"
            exit 1
          fi

          if [ -d release/data ]; then
            echo "release/data must not be included"
            exit 1
          fi

          test -f release/.env.example
          test -f "release/使用说明.txt"
          test -f release/start.bat
          test -f release/start.sh

      - name: Create zip and checksum
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"
          (cd release && zip -r "../${ASSET_NAME}" .)
          sha256sum "${ASSET_NAME}" | tee "${ASSET_NAME}.sha256"

      - name: Write release notes
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"
          SHA256="$(cut -d ' ' -f 1 "${ASSET_NAME}.sha256")"

          cat > release-notes.md <<EOF
          ## Aliyun DNS Manager ${GITHUB_REF_NAME}

          This release package is built automatically by GitHub Actions.

          ### Upgrade reminder

          Back up your old \`.env\` file and \`data/\` directory before upgrading. Keep the same \`ENCRYPTION_KEY\`, otherwise previously saved AccessKeys may not be readable.

          ### SHA256

          \`\`\`text
          ${SHA256}
          \`\`\`

          ### Verification

          - \`npm run lint\`
          - \`npx tsc --noEmit\`
          - \`npm audit --omit=dev\`
          - \`npm run package\`
          - Release package check: no \`.env\` or \`data/\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSET_NAME}" "${ASSET_NAME}.sha256" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSET_NAME}" "${ASSET_NAME}.sha256" \
              --title "Aliyun DNS Manager ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
