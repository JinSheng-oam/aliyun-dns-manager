name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and upload release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run security and data tests
        run: npm run test:ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build release package
        run: npm run package

      - name: Check release package contents
        run: |
          if [ -f release/.env ]; then
            echo "release/.env must not be included"
            exit 1
          fi

          if [ -d release/data ]; then
            echo "release/data must not be included"
            exit 1
          fi

          test -f release/.env.example
          test -f "release/使用说明.txt"
          test -f release/start.bat
          test -f release/start.sh

      - name: Create zip and checksum
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"
          (cd release && zip -r "../${ASSET_NAME}" .)
          sha256sum "${ASSET_NAME}" | tee "${ASSET_NAME}.sha256"

      - name: Write release notes
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"
          SHA256="$(cut -d ' ' -f 1 "${ASSET_NAME}.sha256")"

          cat > release-notes.md <<EOF
          此发行包由 GitHub Actions 自动构建。

          ### 本版本更新

          - 修复升级后 AccessKey 页面可能先显示为空的问题
          - 密钥管理页和 DNS 管理页改为每次访问时读取当前本地数据
          - 补充常见问题说明，解释旧版本页面缓存导致的显示现象

          ### 升级提醒

          升级前请先备份旧版本目录中的 \`.env\` 文件和 \`data/\` 目录。请保留原来的 \`ENCRYPTION_KEY\`，否则之前保存的 AccessKey 可能无法读取。

          升级后已有登录会话可能失效一次，请使用当前管理员密码重新登录。

          如果你在 `v0.3.0` 遇到“AccessKey 一开始不显示，新增一个后才出现”的情况，升级到本版本并重启应用即可。数据本身没有丢失。

          ### SHA256

          \`\`\`text
          ${SHA256}
          \`\`\`

          ### 自动验证

          - \`npm run lint\`
          - \`npx tsc --noEmit\`
          - \`npm run test:ci\`
          - \`npm audit --omit=dev\`
          - \`npm run package\`
          - 发行包检查：不包含 \`.env\` 或 \`data/\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSET_NAME}" "${ASSET_NAME}.sha256" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSET_NAME}" "${ASSET_NAME}.sha256" \
              --title "Aliyun DNS Manager ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
