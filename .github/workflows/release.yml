name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and upload release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run security and data tests
        run: npm run test:ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build release package
        run: npm run package

      - name: Check release package contents
        run: |
          if [ -f release/.env ]; then
            echo "release/.env must not be included"
            exit 1
          fi

          if [ -d release/data ]; then
            echo "release/data must not be included"
            exit 1
          fi

          test -f release/.env.example
          test -f "release/使用说明.txt"
          test -f release/start.bat
          test -f release/start.sh

      - name: Create zip and checksum
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"
          (cd release && zip -r "../${ASSET_NAME}" .)
          sha256sum "${ASSET_NAME}" | tee "${ASSET_NAME}.sha256"

      - name: Write release notes
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"
          SHA256="$(cut -d ' ' -f 1 "${ASSET_NAME}.sha256")"

          cat > release-notes.md <<EOF
          此发行包由 GitHub Actions 自动构建。

          ### 本版本更新

          - CSV 导入前显示逐行预览和新增、跳过、错误数量
          - 自动跳过当前域名已有记录和导入文件内的重复记录
          - CSV 支持带引号和逗号的字段
          - 增加可重新导入的域名完整 JSON 备份
          - 域名备份保留 TTL 和启用、暂停状态，并阻止导入到错误域名
          - 增加按当前域名查看新增、修改、删除、启停和批量操作历史
          - 增加记录状态及 TTL 最小值、最大值组合筛选
          - 增加导入预览、域名备份、变更历史和筛选回归测试

          ### 升级提醒

          升级前请先备份旧版本目录中的 \`.env\` 文件和 \`data/\` 目录。请保留原来的 \`ENCRYPTION_KEY\`，否则之前保存的 AccessKey 可能无法读取。

          升级后已有登录会话可能失效一次，请使用当前管理员密码重新登录。

          按域名分类的 DNS 变更历史从升级到本版本后开始记录。旧操作仍可在“操作日志”中查看，但无法自动按域名归类。

          ### SHA256

          \`\`\`text
          ${SHA256}
          \`\`\`

          ### 自动验证

          - \`npm run lint\`
          - \`npx tsc --noEmit\`
          - \`npm run test:ci\`
          - \`npm audit --omit=dev\`
          - \`npm run package\`
          - 发行包检查：不包含 \`.env\` 或 \`data/\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAME="aliyun-dns-manager-${GITHUB_REF_NAME}.zip"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSET_NAME}" "${ASSET_NAME}.sha256" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSET_NAME}" "${ASSET_NAME}.sha256" \
              --title "Aliyun DNS Manager ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
