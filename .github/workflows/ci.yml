name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test, lint, typecheck, audit, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run security and data tests
        run: npm run test:ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build release package
        run: npm run package

      - name: Check release package contents
        run: |
          if [ -f release/.env ]; then
            echo "release/.env must not be included"
            exit 1
          fi

          if [ -d release/data ]; then
            echo "release/data must not be included"
            exit 1
          fi

          test -f release/.env.example
          test -f "release/使用说明.txt"
          test -f release/start.bat
          test -f release/start.sh
